# Plugins [[[
# -----------

# The variables below contain configuration options for various SnappyMail
# plugins. See :ref:`snappymail__ref_plugins` for further details.

# .. envvar:: snappymail__plugin_repository [[[
#
# Base URL of the plugin repository.
snappymail__plugin_repo: 'https://snappymail.eu/repository/v2/'

                                                                   # ]]]
# .. envvar:: snappymail__plugin_json_url [[[
#
# URL of the .json list of available plugins in the repository.
snappymail__plugin_json_url: '{{ snappymail__plugin_repo + "packages.json" }}'

                                                                   # ]]]
# .. envvar:: snappymail__default_plugins [[[
#
# List of plugins configured by the role.
snappymail__default_plugins:

    # Suggests email addresses found via LDAP
  - name: 'ldap-contacts-suggestions'
    state: '{{ "present" if
               snappymail__ldap_enabled | d(False)
               else "absent" }}'
    options:

      - name: 'ldap_uri'
        value: '{{ snappymail__ldap_uris | join(" ") }}'

      - name: 'use_start_tls'
        value: '{{ snappymail__ldap_use_tls | d(False) | bool }}'

      - name: 'bind_dn'
        value: '{{ snappymail__ldap_binddn }}'

      - name: 'bind_password'
        value: '{{ snappymail__ldap_bindpw }}'

      - name: 'base_dn'
        comment: |
          Supported tokens: {email}, {email:user}, {email:domain}, {login},
          {domain}, {domain:dc}, {imap:login}, {imap:host}, {imap:port}
        value: '{{ snappymail__ldap_people_dn }}'

      - name: 'object_classes'
        value: 'inetOrgPerson'

      - name: 'uid_attributes'
        value: 'uid'

      - name: 'name_attributes'
        value: 'displayName,cn,givenName,sn'

      - name: 'mail_attributes'
        value: 'mailAddress,mail,mailAlternateAddress,mailAlias,mailContactAddress'

      - name: 'allowed_emails'
        value: '*'

    # Allows users to change their LDAP passwords via the webmail UI
  - name: 'change-password'
    state: '{{ "present" if
               snappymail__ldap_enabled | d(False)
               else "absent" }}'
    options:

      - name: 'pass_min_length'
        value: 1

      - name: 'pass_min_strength'
        value: 0

      - name: 'driver_ldap_enabled'
        value: True

      - name: 'driver_ldap_allowed_emails'
        value: '*'

      - name: 'ldap_uri'
        value: '{{ snappymail__ldap_uris | join(" ") }}'

      - name: 'ldap_use_start_tls'
        value: '{{ snappymail__ldap_use_tls | d(False) | bool }}'

      - name: 'ldap_user_dn_format'
        comment: |
          Supported tokens: {email}, {email:user}, {email:domain}, {login},
          {domain}, {domain:dc}, {imap:login}, {imap:host}, {imap:port}, {gecos}
        value: 'uid={email:user},{{ snappymail__ldap_people_dn }}'

      - name: 'ldap_password_field'
        value: 'userPassword'

      - name: 'ldap_password_enc_type'
        value: 'SHA'

      - name: 'driver_pdo_enabled'
        value: False

      - name: 'driver_pdo_allowed_emails'
        value: '*'

      - name: 'pdo_dsn'
        value: 'mysql:host=localhost;dbname=snappymail;charset=utf8'

      - name: 'pdo_user'
        value: ''

      - name: 'pdo_password'
        value: ''

      - name: 'pdo_sql'
        value: 'UPDATE table SET password = :newpass WHERE domain = :domain AND username = :username and oldpass = :oldpass'

      - name: 'pdo_encrypt'
        value: 'none'

      - name: 'pdo_encryptprefix'
        value: ''

      - name: 'pdo_mysql_ssl'
        value: False

      - name: 'pdo_mysql_ssl_verify'
        value: False

      - name: 'pdo_mysql_ssl_ca'
        value: '/etc/pki/tls/certs/ca-bundle.crt'

                                                                   # ]]]
# .. envvar:: snappymail__plugins [[[
#
# List of plugins configured on all hosts in the Ansible inventory.
snappymail__plugins: []

                                                                   # ]]]
# .. envvar:: snappymail__group_plugins [[[
#
# List of plugins configured on hosts in a specific Ansible inventory group.
snappymail__group_plugins: []

                                                                   # ]]]
# .. envvar:: snappymail__host_plugins [[[
#
# List of plugins configured on specific hosts in the Ansible inventory.
snappymail__host_plugins: []

                                                                   # ]]]
# .. envvar:: snappymail__combined_plugins [[[
#
# Varlable which combines all plugin lists, used in role tasks and templates.
snappymail__combined_plugins: '{{ snappymail__default_plugins
                                  + snappymail__plugins
                                  + snappymail__group_plugins
                                  + snappymail__host_plugins }}'

                                                                   # ]]]
                                                                   # ]]]
# Role-dependent configuration [[[
# --------------------------------

# .. envvar:: snappymail__keyring__dependent_gpg_user [[[
#
# The UNIX account which will be used to install additional GPG keys by the
# :ref:`debops.keyring` role.
snappymail__keyring__dependent_gpg_user: '{{ snappymail__user }}'

                                                                   # ]]]
# ..
# .. envvar:: snappymail__keyring__dependent_gpg_keys [[[
#
# GPG key configuration for the :ref:`debops.keyring` Ansible role.
snappymail__keyring__dependent_gpg_keys:

  - user: '{{ snappymail__user }}'
    group: '{{ snappymail__group }}'
    home: '{{ snappymail__home }}'
    id: '{{ snappymail__gpg_key }}'

  - '{{ snappymail__additional_gpg_keys }}'

                                                                   # ]]]
# .. envvar:: snappymail__keyring__dependent_apt_keys [[[
#
# APT key configuration for the :ref:`debops.keyring` Ansible role.
snappymail__keyring__dependent_apt_keys:

  - id: '{{ snappymail__gpg_key }}'
    repo: '{{ snappymail__apt_repository }}'
    keyring: '{{ snappymail__apt_keyring }}'
    state: 'present'

                                                                   # ]]]
# .. envvar:: snappymail__ldap__dependent_tasks [[[
#
# Configuration for the :ref:`debops.ldap` Ansible role.
snappymail__ldap__dependent_tasks:

  - name: 'Create SnappyMail account for {{ snappymail__ldap_device_dn | join(",") }}'
    dn: '{{ snappymail__ldap_binddn }}'
    objectClass: '{{ snappymail__ldap_self_object_classes }}'
    attributes: '{{ snappymail__ldap_self_attributes }}'
    no_log: True
    state: '{{ "present" if snappymail__ldap_enabled and
                            snappymail__ldap_device_dn | d() else "ignore" }}'

                                                                   # ]]]
# .. envvar:: snappymail__nginx__dependent_servers [[[
#
# Server configuration managed by the :ref:`debops.nginx` role.
snappymail__nginx__dependent_servers:

  - name: '{{ snappymail__fqdn }}'
    filename: 'debops.snappymail'
    by_role: 'debops.snappymail'
    type: 'php'
    root: '{{ snappymail__public_dir }}'
    webroot_create: False
    access_policy: '{{ snappymail__nginx_access_policy }}'
    index: 'index.php'

    options: |
      autoindex off;
      client_max_body_size {{ snappymail__max_file_size }}M;
      client_body_buffer_size 128k;

    location_list:
      - pattern: '/'
        options: |
          try_files $uri $uri/ @snappymail;

      - pattern: '~ ^/?(installer|[A-Z0-9]+$)'
        options: |
          deny all;

      - pattern: '~ ^/?(\.git|\.tx|SQL|bin|config|logs|temp|tests|program\/(include|lib|localization|steps))'
        options: |
          deny all;

      - pattern: '~ /(README\.md|composer\.json-dist|composer\.json|package\.xml|Dockerfile)$'
        options: |
          deny all;

    php_options: |
      fastcgi_intercept_errors        on;
      fastcgi_ignore_client_abort     off;
      fastcgi_connect_timeout         60;
      fastcgi_send_timeout            180;
      fastcgi_read_timeout            180;
      fastcgi_buffer_size             128k;
      fastcgi_buffers               4 256k;
      fastcgi_busy_buffers_size       256k;
      fastcgi_temp_file_write_size    256k;

    php_upstream: 'php_snappymail'

                                                                   # ]]]
# .. envvar:: snappymail__nginx_access_policy [[[
#
# Name of the "nginx access policy" for the SnappyMail webpage. See the
# :ref:`debops.nginx` Ansible role for more details.
snappymail__nginx_access_policy: ''

                                                                   # ]]]
# .. envvar:: snappymail__nginx__dependent_upstreams [[[
#
# PHP upstream server configuration managed by the :ref:`debops.nginx` role.
snappymail__nginx__dependent_upstreams:

  - name: 'php_snappymail'
    by_role: 'debops.snappymail'
    enabled: True
    type: 'php'
    php_pool: 'snappymail'

                                                                   # ]]]
# .. envvar:: snappymail__php__dependent_packages [[[
#
# List of PHP packages to install using the :ref:`debops.php` role.
snappymail__php__dependent_packages:
  - '{{ snappymail__php_packages }}'

                                                                   # ]]]
# .. envvar:: snappymail__php__dependent_pools [[[
#
# PHP pools managed by the :ref:`debops.php` role.
snappymail__php__dependent_pools:
  name: 'snappymail'
  by_role: 'debops.snappymail'
  user: '{{ snappymail__user }}'
  group: '{{ snappymail__group }}'

  php_values:
    ## https://secure.php.net/manual/en/info.configuration.php#ini.upload-max-filesize
    upload_max_filesize:        '{{ snappymail__max_file_size }}M'

    ## https://secure.php.net/manual/en/ini.core.php#ini.post-max-size
    post_max_size:              '{{ snappymail__max_file_size }}M'

    file_uploads:               'on'
    mbstring.func_overload:     'off'
    memory_limit:               '64M'
    magic_quotes_runtime:       'off'
    magic_quotes_sybase:        'off'
    session.auto_start:         'off'
    suhosin.session.encrypt:    'off'

                                                                   # ]]]
                                                                   # ]]]
                                                                   # ]]]
