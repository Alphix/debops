- name: Import DebOps global handlers
  ansible.builtin.import_role:
    name: 'global_handlers'

- name: Make sure that necessary directories exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: 'directory'
    owner: 'root'
    group: 'root'
    mode: '0755'
  loop:
    - '/etc/gssproxy'
    - '/etc/systemd/system/gssproxy.service.d'
  tags: [ 'role::gssproxy:install' ]

- name: Create systemd drop-in
  ansible.builtin.template:
    src: 'etc/systemd/system/gssproxy.service.d/debops.conf.j2'
    dest: '/etc/systemd/system/gssproxy.service.d/debops.conf'
    owner: 'root'
    group: 'root'
    mode: '0644'
  notify: [ 'Restart gssproxy service' ]
  tags: [ 'role::gssproxy:config' ]

- name: Create diversions
  debops.debops.dpkg_divert:
    path: '{{ item }}'
    state: 'present'
    delete: True
  loop:
    - '/etc/gssproxy/gssproxy.conf'
    - '/etc/gssproxy/24-nfs-server.conf'
  tags: [ 'role::gssproxy:config' ]

- name: Create configuration files
  ansible.builtin.template:
    src: 'etc/gssproxy/file.conf.j2'
    dest: '/etc/gssproxy/{{ item.name }}.conf'
    owner: 'root'
    group: 'root'
    mode: '0644'
  loop: '{{ gssproxy__combined_configuration | flatten | debops.debops.parse_kv_config }}'
  loop_control:
    label: '{{ "/etc/gssproxy/" + item.name + ".conf" }}'
  when: item.name | d() and item.state | d("present") == "present"
  notify: [ 'Restart gssproxy service' ]
  tags: [ 'role::gssproxy:config' ]

- name: Remove configuration files
  ansible.builtin.file:
    dest: '/etc/gssproxy/{{ item.name }}.conf'
    state: 'absent'
  loop: '{{ gssproxy__combined_configuration | flatten | debops.debops.parse_kv_config }}'
  loop_control:
    label: '{{ "/etc/gssproxy/" + item.name + ".conf" }}'
  when: item.name | d() and item.state | d("present") == "absent"
  notify: [ 'Restart gssproxy service' ]
  tags: [ 'role::gssproxy:config' ]

- name: Install required packages
  ansible.builtin.package:
    name: '{{ (gssproxy__base_packages + gssproxy__packages) | flatten }}'
    state: 'present'
  register: gssproxy__register_packages
  until: gssproxy__register_packages is succeeded
  tags: [ 'role::gssproxy:install' ]

- name: Ensure that the gssproxy service is enabled and started
  ansible.builtin.systemd:
    name: 'gssproxy.service'
    enabled: True
    state: 'started'
  when: not ansible_check_mode

- name: Make sure that Ansible local facts directory exists
  ansible.builtin.file:
    path: '/etc/ansible/facts.d'
    state: 'directory'
    mode: '0755'

- name: Save gssproxy local facts
  ansible.builtin.template:
    src: 'etc/ansible/facts.d/gssproxy.fact.j2'
    dest: '/etc/ansible/facts.d/gssproxy.fact'
    mode: '0755'
  notify: [ 'Refresh host facts' ]
  tags: [ 'meta::facts' ]

- name: Flush handlers
  ansible.builtin.meta: 'flush_handlers'
