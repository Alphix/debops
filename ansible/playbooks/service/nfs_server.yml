- name: Configure NFS Server
  collections: [ 'debops.debops', 'debops.roles01',
                 'debops.roles02', 'debops.roles03' ]
  hosts: [ 'debops_service_nfs_server' ]
  become: True

  environment: '{{ inventory__environment | d({})
                   | combine(inventory__group_environment | d({}))
                   | combine(inventory__host_environment  | d({})) }}'

  roles:

    - role: etc_services
      tags: [ 'role::etc_services', 'skip::etc_services', 'role::ferm' ]
      etc_services__dependent_list:
        - '{{ nfs_server__etc_services__dependent_list }}'

    - role: ferm
      tags: [ 'role::ferm', 'skip::ferm' ]
      ferm__dependent_rules:
        - '{{ nfs_server__ferm__dependent_rules }}'

    - role: tcpwrappers
      tags: [ 'role::tcpwrappers', 'skip::tcpwrappers' ]
      tcpwrappers__dependent_allow:
        - '{{ nfs_server__tcpwrappers__dependent_allow }}'

    - role: ldap
      tags: [ 'role::ldap', 'skip::ldap' ]
      ldap__dependent_tasks:
        - '{{ nfs_server__ldap__dependent_tasks }}'

    - role: kerberos
      tags: [ 'role::kerberos', 'skip::kerberos' ]
      kerberos__dependent_tasks:
        - '{{ nfs_server__kerberos__dependent_tasks }}'

    - role: gssproxy
      tags: [ 'role::gssproxy', 'skip::gssproxy' ]
      gssproxy__dependent_configuration:
        - '{{ nfs_server__gssproxy__dependent_configuration }}'
      when: nfs_server__kerberos | d(False) | bool

    - role: nfs_server
      tags: [ 'role::nfs_server', 'skip::nfs_server' ]
