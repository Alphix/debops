- name: Install and manage SnappyMail
  collections: [ 'debops.debops', 'debops.roles01',
                 'debops.roles02', 'debops.roles03' ]
  hosts: [ 'debops_service_snappymail' ]
  become: True

  environment: '{{ inventory__environment | d({})
                   | combine(inventory__group_environment | d({}))
                   | combine(inventory__host_environment  | d({})) }}'

  pre_tasks:

    - name: Apply keyring configuration
      ansible.builtin.import_role:
        name: 'keyring'
      vars:
        keyring__dependent_apt_keys: '{{ snappymail__keyring__dependent_apt_keys }}'
        keyring__dependent_gpg_user: '{{ snappymail__keyring__dependent_gpg_user }}'
        keyring__dependent_gpg_keys:
          - '{{ snappymail__keyring__dependent_gpg_keys }}'
      tags: [ 'role::keyring', 'skip::keyring',
              'role::snappymail', 'role::snappymail::deployment' ]

    - name: Prepare php environment
      ansible.builtin.import_role:
        name: 'php'
        tasks_from: 'main_env'
      tags: [ 'role::php', 'role::php:env', 'role::logrotate' ]

  roles:

    - role: apt_preferences
      tags: [ 'role::apt_preferences', 'skip::apt_preferences',
              'role::nginx', 'role::php' ]
      apt_preferences__dependent_list:
        - '{{ nginx__apt_preferences__dependent_list }}'
        - '{{ php__apt_preferences__dependent_list }}'

    - role: cron
      tags: [ 'role::cron', 'skip::cron' ]

    - role: logrotate
      tags: [ 'role::logrotate', 'skip::logrotate' ]
      logrotate__dependent_config:
        - '{{ php__logrotate__dependent_config }}'

    - role: ferm
      tags: [ 'role::ferm', 'skip::ferm', 'role::nginx' ]
      ferm__dependent_rules:
        - '{{ nginx__ferm__dependent_rules }}'

    - role: python
      tags: [ 'role::python', 'skip::python', 'role::mariadb', 'role::postgresql' ]
      python__dependent_packages3:
        - '{{ ldap__python__dependent_packages3 }}'
        - '{{ nginx__python__dependent_packages3 }}'
        - '{{ mariadb__python__dependent_packages3 if
              snappymail__database_map[snappymail__database].dbtype == "mariadb"
              else [] }}'
        - '{{ postgresql__python__dependent_packages3 if
              snappymail__database_map[snappymail__database].dbtype == "pgsql"
              else [] }}'
      python__dependent_packages2:
        - '{{ ldap__python__dependent_packages2 }}'
        - '{{ nginx__python__dependent_packages2 }}'
        - '{{ mariadb__python__dependent_packages2 if
              snappymail__database_map[snappymail__database].dbtype == "mariadb"
              else [] }}'
        - '{{ postgresql__python__dependent_packages2 if
              snappymail__database_map[snappymail__database].dbtype == "pgsql"
              else [] }}'

    - role: ldap
      tags: [ 'role::ldap', 'skip::ldap' ]
      ldap__dependent_tasks:
        - '{{ snappymail__ldap__dependent_tasks }}'

    - role: php
      tags: [ 'role::php', 'skip::php' ]
      php__dependent_packages:
        - '{{ snappymail__php__dependent_packages }}'
      php__dependent_pools:
        - '{{ snappymail__php__dependent_pools }}'

    - role: nginx
      tags: [ 'role::nginx', 'skip::nginx' ]
      nginx__dependent_servers:
        - '{{ snappymail__nginx__dependent_servers }}'
      nginx__dependent_upstreams:
        - '{{ snappymail__nginx__dependent_upstreams }}'

    - role: mariadb
      tags: [ 'role::mariadb', 'skip::mariadb',
              'role::snappymail:database' ]
      mariadb__dependent_users:
        - database: '{{ snappymail__database_map[snappymail__database].dbname }}'
          user: '{{ snappymail__database_map[snappymail__database].dbuser }}'
          password: '{{ snappymail__database_map[snappymail__database].dbpass }}'
          priv_aux: False
      mariadb__dependent_databases:
        - database: '{{ snappymail__database_map[snappymail__database].dbname }}'
      mariadb__server: '{{ snappymail__database_map[snappymail__database].dbhost }}'
      mariadb__port: '{{ snappymail__database_map[snappymail__database].dbport }}'
      when: snappymail__database_map[snappymail__database].dbtype == 'mariadb'

    - role: postgresql
      tags: [ 'role::postgresql', 'skip::postgresql',
              'role::snappymail:database' ]
      postgresql__dependent_roles:
        - db: '{{ snappymail__database_map[snappymail__database].dbname }}'
          role: '{{ snappymail__database_map[snappymail__database].dbuser }}'
          password: '{{ snappymail__database_map[snappymail__database].dbpass }}'
      postgresql__dependent_databases:
        - database: '{{ snappymail__database_map[snappymail__database].dbname }}'
          owner: '{{ snappymail__database_map[snappymail__database].dbuser }}'
      postgresql__server: '{{ snappymail__database_map[snappymail__database].dbhost }}'
      postgresql__port: '{{ snappymail__database_map[snappymail__database].dbport }}'
      when: snappymail__database_map[snappymail__database].dbtype == 'pgsql'

    - role: snappymail
      tags: [ 'role::snappymail', 'skip::snappymail' ]
